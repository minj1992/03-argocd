apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: enterprise-orders
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/minj1992/03-argocd.git
    targetRevision: master
    path: manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: microservices-lab
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
