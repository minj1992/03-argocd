{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-5 text-center">
            <div class="mb-4">
                <img src="https://ui-avatars.com/api/?name={{ name }}&background=0D8ABC&color=fff&size=128" class="rounded-circle shadow" alt="Profile Image">
            </div>
            <h2>Hello, {{ name }}!</h2>
            <p class="text-muted">Welcome to your Nishant DevOps Lab Profile.</p>
            <div class="mt-4">
                <a href="{{ url_for('logout') }}" class="btn btn-danger">Logout</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
